name: Daily Picks Pipeline

on:
  schedule:
    - cron: '0 1 * * *'     # 9 PM ET — preview run (RotoGrinders projected lineups)
    - cron: '15 15 27 3 *'  # 11:15 AM ET — Opening Day early run (Mar 27)
    - cron: '0 17 * * *'    # 1 PM ET — early run (projected lineups)
    - cron: '0 22 * * *'    # 6 PM ET — late run (confirmed lineups)
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to run (YYYY-MM-DD, blank=today)'
        required: false
        type: string
      mode:
        description: 'Run mode'
        required: false
        type: choice
        options:
          - preview
          - early
          - late
        default: late

permissions:
  contents: write

jobs:
  daily-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up environment
        run: |
          echo "ODDS_API_KEY=${{ secrets.ODDS_API_KEY }}" >> .env
          echo "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" >> .env
          echo "RESEND_FROM_EMAIL=${{ secrets.RESEND_FROM_EMAIL }}" >> .env

      - name: Restore state from repo
        run: |
          # State pickles are committed to data/state/
          if ls data/state/state_*.pkl 1>/dev/null 2>&1; then
            echo "State files found"
            ls -la data/state/
          else
            echo "No state files found — run init_season.py first"
            exit 1
          fi

      - name: Determine run mode and date
        id: mode
        run: |
          if [ -n "${{ inputs.mode }}" ]; then
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 1 * * *" ]; then
            echo "mode=preview" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "15 15 27 3 *" ]; then
            echo "mode=early" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 17 * * *" ]; then
            echo "mode=early" >> $GITHUB_OUTPUT
          else
            echo "mode=late" >> $GITHUB_OUTPUT
          fi

          # Preview mode runs at 9 PM ET for *tomorrow's* games
          MODE=$(grep mode $GITHUB_OUTPUT | tail -1 | cut -d= -f2)
          if [ "$MODE" = "preview" ] && [ -z "${{ inputs.date }}" ]; then
            TOMORROW=$(date -u -d "+1 day" +%Y-%m-%d 2>/dev/null || date -u -v+1d +%Y-%m-%d)
            echo "date=$TOMORROW" >> $GITHUB_OUTPUT
          fi

          echo "Run mode: $MODE"

      - name: Update yesterday's results
        if: steps.mode.outputs.mode == 'early'
        run: python3 scripts/update_results.py
        continue-on-error: true

      - name: Run daily pipeline
        run: |
          DATE_FLAG=""
          if [ -n "${{ inputs.date }}" ]; then
            DATE_FLAG="--date ${{ inputs.date }}"
          elif [ -n "${{ steps.mode.outputs.date }}" ]; then
            DATE_FLAG="--date ${{ steps.mode.outputs.date }}"
          fi
          python3 scripts/run_daily.py $DATE_FLAG --mode ${{ steps.mode.outputs.mode }}

      - name: Generate website
        run: python3 site/generate.py

      - name: Send newsletter
        if: steps.mode.outputs.mode == 'late'
        run: |
          python3 -c "
          import json, sys
          sys.path.insert(0, '.')
          from pathlib import Path
          from src.newsletter.sender import send_daily_picks

          # Find today's picks file
          daily_dir = Path('data/daily')
          files = sorted(daily_dir.glob('*.json'))
          picks_files = [f for f in files if f.name != 'results.json']
          if picks_files:
              with open(picks_files[-1]) as f:
                  picks = json.load(f)
              if picks.get('picks'):
                  send_daily_picks(picks)
              else:
                  print('No picks today, skipping newsletter')
          "
        continue-on-error: true

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/state/ data/daily/ site/public/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            MODE="${{ steps.mode.outputs.mode }}"
            DATE=$(date +%Y-%m-%d)
            git commit -m "Daily pipeline ($MODE): ${DATE}"
            git push
          fi
