name: Daily Picks Pipeline

on:
  schedule:
    - cron: '0 12 * * *'    # 8 AM ET — grade results, generate picks, send newsletter + tweet
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to run (YYYY-MM-DD, blank=today)'
        required: false
        type: string
      mode:
        description: 'Run mode'
        required: false
        type: choice
        options:
          - early
          - late
        default: late

permissions:
  contents: write

concurrency:
  group: daily-pipeline
  cancel-in-progress: false

jobs:
  daily-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up environment
        run: |
          echo "ODDS_API_KEY=${{ secrets.ODDS_API_KEY }}" >> .env
          echo "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" >> .env
          echo "RESEND_FROM_EMAIL=${{ secrets.RESEND_FROM_EMAIL }}" >> .env
          echo "RESEND_AUDIENCE_ID=${{ secrets.RESEND_AUDIENCE_ID }}" >> .env
          echo "TWITTER_API_KEY=${{ secrets.TWITTER_API_KEY }}" >> .env
          echo "TWITTER_API_SECRET=${{ secrets.TWITTER_API_SECRET }}" >> .env
          echo "TWITTER_ACCESS_TOKEN=${{ secrets.TWITTER_ACCESS_TOKEN }}" >> .env
          echo "TWITTER_ACCESS_TOKEN_SECRET=${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}" >> .env

      - name: Restore state from repo
        run: |
          if ls data/state/state_*.pkl 1>/dev/null 2>&1; then
            echo "State files found"
            ls -la data/state/
          else
            echo "No state files found — run init_season.py first"
            exit 1
          fi

      - name: Determine run mode
        id: mode
        run: |
          INPUT_MODE="${{ inputs.mode }}"

          if [ -n "$INPUT_MODE" ]; then
            MODE="$INPUT_MODE"
          else
            MODE="late"
          fi

          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "send_newsletter=true" >> $GITHUB_OUTPUT
          echo "Run mode: $MODE (input=$INPUT_MODE)"

      - name: Grade yesterday's results (always, before any pipeline run)
        run: python3 scripts/update_results.py
        continue-on-error: true

      - name: Pull latest before pipeline (avoid conflicts)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash --include-untracked || true
          git pull --rebase || git reset --hard origin/main
          git stash pop || true

      - name: Run daily pipeline
        run: |
          DATE_FLAG=""
          if [ -n "${{ inputs.date }}" ]; then
            DATE_FLAG="--date ${{ inputs.date }}"
          fi
          python3 scripts/run_daily.py $DATE_FLAG --mode ${{ steps.mode.outputs.mode }}

      - name: Generate website
        run: python3 site/generate.py

      - name: Send newsletter
        if: steps.mode.outputs.send_newsletter == 'true'
        run: |
          python3 -c "
          import json, sys
          sys.path.insert(0, '.')
          from pathlib import Path
          from src.newsletter.sender import send_daily_picks

          daily_dir = Path('data/daily')
          files = sorted(f for f in daily_dir.glob('2026-*.json')
                         if not f.name.startswith(('odds_cache', 'spread_cache')))
          if files:
              with open(files[-1]) as f:
                  picks = json.load(f)
              send_daily_picks(picks)
          else:
              print('No daily data found, skipping newsletter')
          "
        continue-on-error: true

      - name: Post to Twitter
        if: steps.mode.outputs.send_newsletter == 'true'
        run: |
          python3 -c "
          import json, sys
          sys.path.insert(0, '.')
          from pathlib import Path
          from src.twitter.poster import post_daily_picks

          daily_dir = Path('data/daily')
          files = sorted(f for f in daily_dir.glob('2026-*.json')
                         if not f.name.startswith(('odds_cache', 'spread_cache')))
          if files:
              with open(files[-1]) as f:
                  picks = json.load(f)
              post_daily_picks(picks)
          else:
              print('No daily data found, skipping Twitter post')
          "
        continue-on-error: true

      - name: Generate TikTok video
        run: |
          python3 -c "
          import json, sys
          sys.path.insert(0, '.')
          from pathlib import Path
          from src.tiktok.video import generate_picks_video
          from src.tiktok.poster import deploy_video

          daily_dir = Path('data/daily')
          files = sorted(f for f in daily_dir.glob('2026-*.json')
                         if not f.name.startswith(('odds_cache', 'spread_cache')))
          if files:
              with open(files[-1]) as f:
                  picks = json.load(f)
              video = generate_picks_video(files[-1])
              if video:
                  deploy_video(video, picks)
          else:
              print('No daily data found, skipping TikTok video')
          "
        continue-on-error: true

      - name: Commit and push updates
        run: |
          git add data/state/ data/daily/ site/public/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            MODE="${{ steps.mode.outputs.mode }}"
            DATE=$(date +%Y-%m-%d)
            git commit -m "Daily pipeline ($MODE): ${DATE}"
            git pull --rebase || (git rebase --abort 2>/dev/null; git stash && git pull --rebase && git stash pop)
            git push || echo "Push failed — will retry on next run"
          fi
