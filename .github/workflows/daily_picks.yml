name: Daily Picks Pipeline

on:
  schedule:
    - cron: '0 17 * * *'   # 1 PM ET — early run (projected lineups)
    - cron: '0 22 * * *'   # 6 PM ET — late run (confirmed lineups)
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to run (YYYY-MM-DD, blank=today)'
        required: false
        type: string
      spring:
        description: 'Include spring training games'
        required: false
        type: boolean
        default: true
      mode:
        description: 'Run mode'
        required: false
        type: choice
        options:
          - early
          - late
        default: late

permissions:
  contents: write

jobs:
  daily-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up environment
        run: |
          echo "ODDS_API_KEY=${{ secrets.ODDS_API_KEY }}" >> .env
          echo "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" >> .env
          echo "RESEND_FROM_EMAIL=${{ secrets.RESEND_FROM_EMAIL }}" >> .env

      - name: Restore state from repo
        run: |
          # State pickles are committed to data/state/
          if ls data/state/state_*.pkl 1>/dev/null 2>&1; then
            echo "State files found"
            ls -la data/state/
          else
            echo "No state files found — run init_season.py first"
            exit 1
          fi

      - name: Determine run mode
        id: mode
        run: |
          if [ -n "${{ inputs.mode }}" ]; then
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 17 * * *" ]; then
            echo "mode=early" >> $GITHUB_OUTPUT
          else
            echo "mode=late" >> $GITHUB_OUTPUT
          fi
          echo "Run mode: $(cat $GITHUB_OUTPUT | grep mode | cut -d= -f2)"

      - name: Determine spring training flag
        id: season
        run: |
          # Auto-detect: spring training if before April 1, or if manually set
          MONTH=$(date +%-m)
          DAY=$(date +%-d)
          if [ "${{ inputs.spring }}" = "true" ] || ([ "$MONTH" -eq 3 ] && [ "$DAY" -le 31 ]); then
            echo "spring_flag=--spring" >> $GITHUB_OUTPUT
          else
            echo "spring_flag=" >> $GITHUB_OUTPUT
          fi

      - name: Update yesterday's results
        if: steps.mode.outputs.mode == 'early'
        run: python3 scripts/update_results.py ${{ steps.season.outputs.spring_flag }}
        continue-on-error: true

      - name: Run daily pipeline
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            python3 scripts/run_daily.py --date "${{ inputs.date }}" --mode ${{ steps.mode.outputs.mode }} ${{ steps.season.outputs.spring_flag }}
          else
            python3 scripts/run_daily.py --mode ${{ steps.mode.outputs.mode }} ${{ steps.season.outputs.spring_flag }}
          fi

      - name: Generate website
        run: python3 site/generate.py

      - name: Send newsletter
        if: steps.mode.outputs.mode == 'late'
        run: |
          python3 -c "
          import json, sys
          sys.path.insert(0, '.')
          from pathlib import Path
          from src.newsletter.sender import send_daily_picks

          # Find today's picks file
          daily_dir = Path('data/daily')
          files = sorted(daily_dir.glob('*.json'))
          picks_files = [f for f in files if f.name != 'results.json']
          if picks_files:
              with open(picks_files[-1]) as f:
                  picks = json.load(f)
              if picks.get('picks'):
                  send_daily_picks(picks)
              else:
                  print('No picks today, skipping newsletter')
          "
        continue-on-error: true

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/state/ data/daily/ site/public/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            MODE="${{ steps.mode.outputs.mode }}"
            DATE=$(date +%Y-%m-%d)
            git commit -m "Daily pipeline ($MODE): ${DATE}"
            git push
          fi
