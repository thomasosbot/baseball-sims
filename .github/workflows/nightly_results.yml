name: Nightly Results Tweet

on:
  # Triggered by cron-job.org at 12:45 AM ET (4:45 UTC)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly-results
  cancel-in-progress: false

jobs:
  nightly-results:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up environment
        run: |
          echo "ODDS_API_KEY=${{ secrets.ODDS_API_KEY }}" >> .env

      - name: Restore state from repo
        run: |
          if ls data/state/state_*.pkl 1>/dev/null 2>&1; then
            echo "State files found"
          else
            echo "No state files found"
            exit 1
          fi

      - name: Grade today's results
        run: python3 scripts/update_results.py
        continue-on-error: true

      - name: Pull latest (avoid conflicts)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash --include-untracked || true
          git pull --rebase || git reset --hard origin/main
          git stash pop || true

      - name: Regenerate results page only
        run: |
          python3 -c "
          import json, sys, importlib.util
          sys.path.insert(0, '.')
          from pathlib import Path
          from jinja2 import Environment, FileSystemLoader

          # Import generate.py via importlib (avoids conflict with built-in 'site' module)
          spec = importlib.util.spec_from_file_location('generate', 'site/generate.py')
          gen = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(gen)

          SITE_DIR = Path('site')
          OUTPUT_DIR = SITE_DIR / 'public'
          DAILY_DIR = Path('data/daily')
          RESULTS_PATH = DAILY_DIR / 'results.json'

          env = Environment(loader=FileSystemLoader(str(SITE_DIR / 'templates')))

          season_results = []
          if RESULTS_PATH.exists():
              with open(RESULTS_PATH) as f:
                  season_results = json.load(f)

          stats = gen._compute_season_stats(season_results)

          all_picks = []
          for day in season_results:
              for pick in day.get('picks', []):
                  all_picks.append({**pick, 'date': day['date']})

          dashboard_ctx = gen._compute_dashboard_context(season_results, stats, all_picks)
          template = env.get_template('dashboard.html')
          html = template.render(**dashboard_ctx)
          (OUTPUT_DIR / 'results.html').write_text(html)
          print('  results.html regenerated')
          "
        continue-on-error: true

      - name: Post results to Twitter
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: |
          python3 -c "
          import sys
          sys.path.insert(0, '.')
          from src.twitter.results_poster import post_nightly_results
          post_nightly_results()
          "
        continue-on-error: true

      - name: Post results to Discord
        env:
          DISCORD_WEBHOOK_URL_RESULTS: ${{ secrets.DISCORD_WEBHOOK_URL_RESULTS }}
        run: |
          python3 -c "
          import sys
          sys.path.insert(0, '.')
          from src.discord.poster import post_nightly_results
          post_nightly_results()
          "
        continue-on-error: true

      - name: Commit and push updated results
        run: |
          git add data/state/ data/daily/ site/public/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Nightly results: $(date +%Y-%m-%d)"
            git pull --rebase || (git rebase --abort 2>/dev/null; git stash && git pull --rebase && git stash pop)
            git push || echo "Push failed"
          fi
