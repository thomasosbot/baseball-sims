name: Nightly Results Tweet

on:
  # Triggered by cron-job.org at 12:45 AM ET (4:45 UTC)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly-results
  cancel-in-progress: false

jobs:
  nightly-results:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up environment
        run: |
          echo "ODDS_API_KEY=${{ secrets.ODDS_API_KEY }}" >> .env

      - name: Restore state from repo
        run: |
          if ls data/state/state_*.pkl 1>/dev/null 2>&1; then
            echo "State files found"
          else
            echo "No state files found"
            exit 1
          fi

      - name: Grade today's results
        run: python3 scripts/update_results.py
        continue-on-error: true

      - name: Pull latest (avoid conflicts)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash --include-untracked || true
          git pull --rebase || git reset --hard origin/main
          git stash pop || true

      - name: Regenerate results page only
        run: |
          python3 -c "
          import json, sys
          sys.path.insert(0, '.')
          from pathlib import Path
          from jinja2 import Environment, FileSystemLoader

          SITE_DIR = Path('site')
          OUTPUT_DIR = SITE_DIR / 'public'
          DAILY_DIR = Path('data/daily')
          RESULTS_PATH = DAILY_DIR / 'results.json'

          env = Environment(loader=FileSystemLoader(str(SITE_DIR / 'templates')))

          season_results = []
          if RESULTS_PATH.exists():
              with open(RESULTS_PATH) as f:
                  season_results = json.load(f)

          total_wins = sum(r.get('wins', 0) for r in season_results)
          total_losses = sum(r.get('losses', 0) for r in season_results)
          total_profit = sum(r.get('day_profit', 0) for r in season_results)
          total_wagered = sum(sum(abs(p.get('wager', 0)) for p in r.get('picks', [])) for r in season_results)
          roi = round(total_profit / total_wagered * 100, 1) if total_wagered > 0 else 0
          # Build daily P&L for chart
          cumulative = 0
          daily_pnl = []
          for d in season_results:
              cumulative += d['day_profit']
              daily_pnl.append({'date': d['date'], 'day_profit': d['day_profit'],
                                'cumulative': round(cumulative, 2), 'bankroll': round(10000.0 + cumulative, 2)})

          # Streak
          streak = 0
          if season_results:
              for d in reversed(season_results):
                  if d['day_profit'] > 0: streak += 1
                  else: break

          stats = {'wins': total_wins, 'losses': total_losses, 'total_profit': total_profit,
                   'roi': roi, 'bankroll': round(10000.0 + total_profit, 2),
                   'current_bankroll': round(10000.0 + total_profit, 2),
                   'starting_bankroll': 10000, 'daily_pnl': daily_pnl, 'streak': streak}

          all_picks = []
          for day in season_results:
              for pick in day.get('picks', []):
                  all_picks.append({**pick, 'date': day['date']})

          all_days = []
          for f in sorted(DAILY_DIR.glob('2026-*.json')):
              if f.name in ('results.json', 'changelog.json') or f.name.startswith(('odds_cache', 'spread_cache')):
                  continue
              with open(f) as fh:
                  all_days.append(json.load(fh))

          template = env.get_template('history.html')
          html = template.render(results=season_results, stats=stats, all_days=all_days, all_picks=all_picks)
          (OUTPUT_DIR / 'results.html').write_text(html)
          print('  results.html regenerated')
          "
        continue-on-error: true

      - name: Post results to Twitter
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: |
          python3 -c "
          import sys
          sys.path.insert(0, '.')
          from src.twitter.results_poster import post_nightly_results
          post_nightly_results()
          "
        continue-on-error: true

      - name: Post results to Discord
        env:
          DISCORD_WEBHOOK_URL_RESULTS: ${{ secrets.DISCORD_WEBHOOK_URL_RESULTS }}
        run: |
          python3 -c "
          import sys
          sys.path.insert(0, '.')
          from src.discord.poster import post_nightly_results
          post_nightly_results()
          "
        continue-on-error: true

      - name: Commit and push updated results
        run: |
          git add data/state/ data/daily/ site/public/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Nightly results: $(date +%Y-%m-%d)"
            git pull --rebase || (git rebase --abort 2>/dev/null; git stash && git pull --rebase && git stash pop)
            git push || echo "Push failed"
          fi
