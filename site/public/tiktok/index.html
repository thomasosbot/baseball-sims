<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ozzy Analytics — TikTok Video</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #14161c;
            color: #f5f7fa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        h1 { font-size: 24px; margin-bottom: 8px; }
        p { color: #a0a5af; margin-bottom: 24px; font-size: 16px; }
        video {
            width: 100%;
            max-width: 360px;
            border-radius: 16px;
            margin-bottom: 24px;
        }
        .btn {
            display: inline-block;
            background: #1877F2;
            color: white;
            font-size: 18px;
            font-weight: 600;
            padding: 16px 40px;
            border-radius: 12px;
            text-decoration: none;
            margin-bottom: 16px;
        }
        .caption-box {
            background: #262a38;
            border-radius: 12px;
            padding: 16px;
            max-width: 360px;
            width: 100%;
            margin-top: 16px;
        }
        .caption-box label {
            font-size: 14px;
            color: #a0a5af;
            display: block;
            margin-bottom: 8px;
        }
        .caption-box textarea {
            width: 100%;
            background: #14161c;
            color: #f5f7fa;
            border: 1px solid #3a3f52;
            border-radius: 8px;
            padding: 12px;
            font-size: 14px;
            resize: none;
            height: 120px;
            font-family: inherit;
        }
        .copy-btn {
            background: #31A24C;
            color: white;
            border: none;
            font-size: 16px;
            font-weight: 600;
            padding: 10px 24px;
            border-radius: 8px;
            margin-top: 8px;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>
    <h1>Today's TikTok Video</h1>
    <p>Ozzy Analytics Daily Picks</p>

    <video controls playsinline>
        <source src="latest.mp4" type="video/mp4">
    </video>

    <a class="btn" href="latest.mp4" download="ozzy_picks.mp4">Download Video</a>

    <div class="caption-box">
        <label>Caption (tap Copy, then paste in TikTok)</label>
        <textarea id="caption" readonly>Loading...</textarea>
        <button class="copy-btn" onclick="copyCaption()">Copy Caption</button>
    </div>

    <script>
        fetch('caption.txt')
            .then(r => r.text())
            .then(t => document.getElementById('caption').value = t)
            .catch(() => {});

        function copyCaption() {
            const ta = document.getElementById('caption');
            ta.select();
            navigator.clipboard.writeText(ta.value).then(() => {
                document.querySelector('.copy-btn').textContent = 'Copied!';
                setTimeout(() => {
                    document.querySelector('.copy-btn').textContent = 'Copy Caption';
                }, 2000);
            });
        }
    </script>
</body>
</html>
